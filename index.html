<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>atmos</title>
    <link  rel = "stylesheet" href = "tailwind.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
      
      body{
        margin:0,

      }
      .font-exo {
        font-family: 'Exo 2', sans-serif;
      }
    </style>
  </head>
  <body>
    
    <div class="flex h-screen bg-black">
      <div class="w-1/2 flex flex-col justify-center px-8">
        <h1 class="text-white text-4xl mb-8 font-exo font-bold">ATMOS</h1>
        <p class="text-white">Change planets and Explore!</p>
        <label for="planets">Choose a planet:</label>
        <select name="planets" id="planets">
          <option value = "mercury">Mercury</option>
          <option value = "venus">Venus</option>
          <option value = "earth">Earth</option>
          <option value = "mars">Mars</option>
          <option value = "jupiter">Jupiter</option>
          <option value = "saturn">Saturn</option>
          <option value = "uranus">Uranus</option>
          <option value = "neptune">Neptune</option>
        </select>
      </div>
      <div class="w-1/2" id="canvasContainer">
        <canvas></canvas>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
